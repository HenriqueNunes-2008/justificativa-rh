<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Justificativa RH</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/responsive.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/admin.css') }}">

</head>

<body>

{% block content %}
{% endblock %}

{% with messages = get_flashed_messages(with_categories=true) %}

{% if messages %}

<div class="flash-container">

    {% for category, message in messages %}

        <div class="flash {{ category }}">

            {{ message }}

        </div>

    {% endfor %}

</div>

{% endif %}

{% endwith %}

<script src="{{ url_for('static', filename='js/modal.js') }}"></script>

<script src="{{ url_for('static', filename='js/password.js') }}"></script>

<script src="{{ url_for('static', filename='js/mascara.js') }}"></script>

<script src="{{ url_for('static', filename='js/assinatura.js') }}"></script>

{% block scripts %}
{% endblock %}

</body>

</html>
